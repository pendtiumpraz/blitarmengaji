<!DOCTYPE html>
<html lang="id" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0E5C46" />
    <title>Offline — Blitar Mengaji</title>
    <style>
      :root {
        --emerald: #0e5c46;
        --emerald-dark: #0a4435;
        --cream: #f4eee1;
        --ink: #2a2a26;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: var(--cream);
        color: var(--ink);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 22rem;
        text-align: center;
      }
      .crest {
        width: 4.5rem;
        height: 4.5rem;
        margin: 0 auto 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        background: var(--emerald);
        color: var(--cream);
        font-size: 1.6rem;
        font-weight: 700;
      }
      .wordmark {
        margin: 0 0 1.5rem;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: 0.01em;
        color: var(--emerald-dark);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.15rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 1.75rem;
        font-size: 0.95rem;
        color: #5a564d;
      }
      button {
        appearance: none;
        cursor: pointer;
        min-height: 44px;
        padding: 0.75rem 1.75rem;
        border: 0;
        border-radius: 9999px;
        background: var(--emerald);
        color: var(--cream);
        font-size: 1rem;
        font-weight: 600;
        transition: background 0.15s ease;
      }
      button:hover,
      button:focus-visible {
        background: var(--emerald-dark);
      }
      button:focus-visible {
        outline: 2px solid var(--emerald-dark);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="crest" aria-hidden="true">ﷺ</div>
      <p class="wordmark">Blitar Mengaji</p>
      <h1>Kamu sedang offline</h1>
      <p>Koneksi terputus. Periksa jaringan internetmu, lalu coba lagi.</p>
      <button type="button" onclick="location.reload()">Coba lagi</button>
    </main>
  </body>
</html>
