        .header {

            padding: 1.5rem 15px;

}

        /* Card Donasi */
        .donation-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .donation-card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .donation-card:hover {
            transform: translateY(-5px);
        }

        .donation-card h3 {
            color: #00796b;
            margin-bottom: 1rem;
        }

        .donation-info {
            margin: 1rem 0;
        }

        .bank-info {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 5px;
            margin: 1rem 0;
        }

        /* Progress Bar */
        .progress-container {
            background: #e0e0e0;
            border-radius: 10px;
            margin: 1.5rem 0;
        }

        .progress-bar {
            width: 0%;
            height: 20px;
            background: linear-gradient(90deg, #00796b, #009688);
            border-radius: 10px;
            transition: width 1s ease-in-out;
            position: relative;
        }

        .progress-text {
            position: absolute;
            right: 10px;
            color: white;
            font-weight: bold;
        }

        #wakaf-map {
            height: 400px;

        }

        let markers = [];

        function renderMarkers(events, showDetails = false) {
            // Hapus semua marker dari peta
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];

            // Tambahkan marker baru berdasarkan acara yang difilter
            events.forEach(event => {
    const marker = L.marker([event.location.lat, event.location.lng]).addTo(map);

    const popupContent = showDetails
        ? `
            <b>${event.name}</b>
            <i>${event.topic}</i>
            <div class="event-speaker">👤 ${event.speaker}</div>
            <div class="event-date">📅 ${event.date} | ⏰ ${event.time} | ${event.keterangan}</div>
            <div>🕌 ${event.location.name}</div>
            <div>📍 ${event.location.description}</div>
            <a href="${event.location.mapsLink}" target="_blank">Lihat di Maps</a>
            <div class="donation-info">
                💵 Donasi: 
                <span>${event.donation.bank} ${event.donation.accountNumber}</span>
            </div>
            <small>${event.dua}</small>
            <div>📞 <a href="${event.contact}" target="_blank">Hubungi</a></div>
        `
        : `
            <b>${event.location.name}</b>
            <div>📍 ${event.location.description}</div>
            <a href="${event.location.mapsLink}" target="_blank">Lihat di Maps</a>
        `;
    marker.bindPopup(popupContent);
    markers.push(marker);
});
        }

        // Filter function
        function filterEvents() {
            const selectedUstadz = document.getElementById('filterUstadz').value;
            const selectedHari = document.getElementById('filterHari').value;

            const filtered = masjidEvents.filter(event => {
                const ustadzMatch = selectedUstadz ? event.speaker === selectedUstadz : true;
                const hariMatch = selectedHari ? event.date === selectedHari : true;
                return ustadzMatch && hariMatch;
            });

            const showDetails = selectedUstadz || selectedHari;
            renderMarkers(filtered, showDetails);
        }

        // Populate dropdowns
        const ustadzDropdown = document.getElementById('filterUstadz');
        const uniqueUstadz = [...new Set(masjidEvents.map(event => event.speaker))];
        uniqueUstadz.forEach(ustadz => {
            const option = document.createElement('option');
            option.value = ustadz;
            option.textContent = ustadz;
            ustadzDropdown.appendChild(option);
        });

        // Event listeners for filters
        document.getElementById('filterUstadz').addEventListener('change', filterEvents);
        document.getElementById('filterHari').addEventListener('change', filterEvents);

        // Initial render
        renderMarkers(masjidEvents);
          // Prevent keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey || e.keyCode == 123) { // Prevent Ctrl+key and F12
            e.preventDefault();
            return false;
        }
    });

    // Prevent right click
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
    });
    </script>
